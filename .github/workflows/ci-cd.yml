name: CI/CD

on:
  push:
    branches: [main, develop, 'feat/**', 'fix/**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  VITE_FIREBASE_AUTH_DOMAIN: click-bateva.firebaseapp.com
  VITE_FIREBASE_PROJECT_ID: click-bateva
  VITE_FIREBASE_STORAGE_BUCKET: click-bateva.firebasestorage.app

jobs:
  # ── Change Detection ──────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      app: ${{ steps.filter.outputs.app }}
      functions: ${{ steps.filter.outputs.functions }}
      firestore: ${{ steps.filter.outputs.firestore }}
      storage: ${{ steps.filter.outputs.storage }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'app/**'
            functions:
              - 'functions/**'
            firestore:
              - 'firestore.rules'
              - 'firestore.indexes.json'
            storage:
              - 'storage.rules'

  # ── CI: App ───────────────────────────────────────────────────────────
  ci-app:
    name: CI — App
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run lint
        continue-on-error: ${{ startsWith(github.ref, 'refs/heads/feat/') || startsWith(github.ref, 'refs/heads/fix/') }}
      - run: npm run test
      - name: Build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: npm run build
      - name: Upload dist
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/feat/') || startsWith(github.ref, 'refs/heads/fix/')
        uses: actions/upload-artifact@v4
        with:
          name: app-dist
          path: app/dist
          retention-days: 1

  # ── CI: Functions ─────────────────────────────────────────────────────
  ci-functions:
    name: CI — Functions
    needs: changes
    if: needs.changes.outputs.functions == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  # ── Deploy: Production (main only) ────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    needs: [changes, ci-app, ci-functions]
    if: >-
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      # Authenticate Firebase CLI
      - name: Authenticate to Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/firebase-sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json" >> "$GITHUB_ENV"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # Download build artifacts
      - name: Download app dist
        if: needs.changes.outputs.app == 'true'
        uses: actions/download-artifact@v4
        with:
          name: app-dist
          path: app/dist

      # Deploy hosting
      - name: Deploy app hosting
        if: needs.changes.outputs.app == 'true'
        run: firebase deploy --only hosting:click-bateva --project click-bateva

      # Deploy functions
      - name: Install functions dependencies
        if: needs.changes.outputs.functions == 'true'
        run: cd functions && npm ci

      - name: Build functions
        if: needs.changes.outputs.functions == 'true'
        run: cd functions && npm run build

      - name: Deploy functions
        if: needs.changes.outputs.functions == 'true'
        run: firebase deploy --only functions --project click-bateva

      # Deploy rules
      - name: Deploy Firestore rules
        if: needs.changes.outputs.firestore == 'true'
        run: firebase deploy --only firestore --project click-bateva

      - name: Deploy Storage rules
        if: needs.changes.outputs.storage == 'true'
        run: firebase deploy --only storage --project click-bateva

      # Cleanup
      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/firebase-sa.json

  # ── Deploy: Preview (develop → staging, feat/** → branch slug) ────────
  deploy-preview:
    name: Deploy Preview — App
    needs: [changes, ci-app]
    if: >-
      always() &&
      (github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/feat/') || startsWith(github.ref, 'refs/heads/fix/')) &&
      github.event_name == 'push' &&
      needs.changes.outputs.app == 'true' &&
      needs.ci-app.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download app dist
        uses: actions/download-artifact@v4
        with:
          name: app-dist
          path: app/dist
      - name: Resolve channel ID
        id: channel
        run: |
          if [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            echo "id=staging" >> $GITHUB_OUTPUT
          else
            SLUG=$(echo "${{ github.ref_name }}" | sed 's|/|-|g' | tr '[:upper:]' '[:lower:]' | cut -c1-20)
            echo "id=$SLUG" >> $GITHUB_OUTPUT
          fi
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: click-bateva
          target: click-bateva
          channelId: ${{ steps.channel.outputs.id }}
          expires: 7d
