name: CI/CD

on:
  push:
    branches: [main, develop, 'feat/**', 'fix/**']

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  VITE_FIREBASE_AUTH_DOMAIN: click-bateva.firebaseapp.com
  VITE_FIREBASE_PROJECT_ID: click-bateva
  VITE_FIREBASE_STORAGE_BUCKET: click-bateva.firebasestorage.app

jobs:
  # ── Change Detection ──────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      app: ${{ steps.filter.outputs.app }}
      crm: ${{ steps.filter.outputs.crm }}
      functions: ${{ steps.filter.outputs.functions }}
      firestore: ${{ steps.filter.outputs.firestore }}
      storage: ${{ steps.filter.outputs.storage }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'app/**'
            crm:
              - 'crm/**'
            functions:
              - 'functions/**'
            firestore:
              - 'firestore.rules'
              - 'firestore.indexes.json'
            storage:
              - 'storage.rules'

  # ── CI: App ───────────────────────────────────────────────────────────
  ci-app:
    name: CI — App
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run lint
        continue-on-error: ${{ startsWith(github.ref, 'refs/heads/feat/') || startsWith(github.ref, 'refs/heads/fix/') }}
      - run: npm run test
      - name: Build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: npm run build
      - name: Upload dist
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: app-dist
          path: app/dist
          retention-days: 1

  # ── CI: CRM ──────────────────────────────────────────────────────────
  ci-crm:
    name: CI — CRM
    needs: changes
    if: needs.changes.outputs.crm == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: crm/package-lock.json
      - run: npm ci
      - run: npm run lint
        continue-on-error: ${{ startsWith(github.ref, 'refs/heads/feat/') || startsWith(github.ref, 'refs/heads/fix/') }}
      - name: Build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: npm run build
      - name: Upload dist
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: crm-dist
          path: crm/dist
          retention-days: 1

  # ── CI: Functions ─────────────────────────────────────────────────────
  ci-functions:
    name: CI — Functions
    needs: changes
    if: needs.changes.outputs.functions == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - name: Upload functions build
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: functions-dist
          path: |
            functions/lib
            functions/package.json
            functions/package-lock.json
          retention-days: 1

  # ── Deploy: Production (main only) ────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    needs: [changes, ci-app, ci-crm, ci-functions]
    if: >-
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      # Authenticate Firebase CLI
      - name: Authenticate to Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/firebase-sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json" >> "$GITHUB_ENV"

      - name: Cache Firebase CLI
        uses: actions/cache@v4
        with:
          path: ~/.npm-global
          key: firebase-cli-${{ runner.os }}-v1
      - name: Install Firebase CLI
        run: |
          npm config set prefix ~/.npm-global
          echo "$HOME/.npm-global/bin" >> $GITHUB_PATH
          npm list -g firebase-tools || npm install -g firebase-tools

      # Download build artifacts
      - name: Download app dist
        if: needs.changes.outputs.app == 'true'
        uses: actions/download-artifact@v4
        with:
          name: app-dist
          path: app/dist

      - name: Download CRM dist
        if: needs.changes.outputs.crm == 'true'
        uses: actions/download-artifact@v4
        with:
          name: crm-dist
          path: crm/dist

      # Deploy hosting
      - name: Deploy app hosting
        if: needs.changes.outputs.app == 'true'
        run: firebase deploy --only hosting:click-bateva --project click-bateva

      - name: Deploy CRM hosting
        if: needs.changes.outputs.crm == 'true'
        run: firebase deploy --only hosting:click-bateva-crm --project click-bateva

      # Deploy functions
      - name: Download functions build
        if: needs.changes.outputs.functions == 'true'
        uses: actions/download-artifact@v4
        with:
          name: functions-dist
          path: functions

      - name: Install functions dependencies
        if: needs.changes.outputs.functions == 'true'
        run: cd functions && npm ci

      - name: Deploy functions
        if: needs.changes.outputs.functions == 'true'
        run: firebase deploy --only functions --project click-bateva

      # Deploy rules
      - name: Deploy Firestore rules
        if: needs.changes.outputs.firestore == 'true'
        run: firebase deploy --only firestore --project click-bateva

      - name: Deploy Storage rules
        if: needs.changes.outputs.storage == 'true'
        run: firebase deploy --only storage --project click-bateva

      # Cleanup
      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/firebase-sa.json

